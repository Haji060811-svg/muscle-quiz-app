<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>筋肉クイズ 〜起始・停止・作用〜</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b5602b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="筋肉クイズ">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#f4f1ea;
    --card:#ffffff;
    --ink:#2b2620;
    --sub:#7a7267;
    --accent:#b5602b;
    --accent-dark:#8f4a20;
    --good:#3e7a4c;
    --bad:#b5382b;
    --border:#e4ddd0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;}
  body{min-height:100vh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;}
  .wrap{max-width:520px;margin:0 auto;padding:16px;}
  header{padding:14px 4px 10px;}
  header h1{font-size:19px;margin:0 0 4px;font-weight:700;}
  header p{margin:0;font-size:12.5px;color:var(--sub);}
  .modebar{display:flex;gap:6px;margin:14px 0 4px;}
  .dp-wrap{margin:2px 0 12px;}
  .dp-bar{height:8px;background:#eee2d0;border-radius:999px;overflow:hidden;}
  .dp-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .3s;}
  .dp-label{font-size:11px;color:var(--sub);margin-top:4px;text-align:center;}
  .stats{display:flex;gap:8px;margin:12px 0 4px;}
  .stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center;}
  .stat b{display:block;font-size:20px;color:var(--accent-dark);}
  .stat span{font-size:11px;color:var(--sub);}
  .region-bar{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0;}
  .region-chip{font-size:11.5px;padding:5px 10px;border-radius:999px;background:var(--card);
    border:1px solid var(--border);color:var(--sub);cursor:pointer;user-select:none;}
  .region-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 16px;
    box-shadow:0 2px 10px rgba(60,40,20,0.05);margin-bottom:14px;}
  .qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .qtag{font-size:11px;background:#efe6d8;color:var(--accent-dark);padding:3px 9px;border-radius:999px;font-weight:600;}
  .qnum{font-size:11px;color:var(--sub);}
  .diagram{text-align:center;}
  .qtitle{font-size:16px;line-height:1.6;font-weight:600;margin:6px 0 14px;text-align:center;}
  .qtitle .muscle{color:var(--accent-dark);}
  .qtitle b{color:var(--accent-dark);}
  .opt{display:block;width:100%;text-align:left;background:#fbf9f5;border:1.5px solid var(--border);
    border-radius:12px;padding:12px 14px;margin-bottom:9px;font-size:14.5px;line-height:1.5;color:var(--ink);
    -webkit-appearance:none;appearance:none;cursor:pointer;}
  .opt:active{transform:scale(0.99);}
  .opt.correct{background:#e9f4ea;border-color:var(--good);color:#245830;font-weight:600;}
  .opt.wrong{background:#faeae7;border-color:var(--bad);color:#8a2a1c;font-weight:600;}
  .opt.disabled{pointer-events:none;opacity:0.55;}
  .opt.disabled.correct,.opt.disabled.wrong{opacity:1;}
  .explain{display:none;margin-top:14px;padding:14px;background:#fbf6ea;border:1px solid #ecd9b3;
    border-radius:12px;font-size:13.5px;line-height:1.7;}
  .explain.show{display:block;}
  .explain b{color:var(--accent-dark);}
  .explain .hint{margin-top:8px;padding-top:8px;border-top:1px dashed #e0c98f;color:#7a6a3f;}
  .nextbtn{display:none;width:100%;padding:14px;margin-top:14px;border:none;border-radius:12px;
    background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
  .nextbtn.show{display:block;}
  .actionrow{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
  .smallbtn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--card);
    font-size:12.5px;color:var(--sub);text-align:center;cursor:pointer;min-width:90px;}
  footer{text-align:center;padding:20px 0 30px;font-size:11px;color:var(--sub);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>筋肉クイズ 〜起始・停止・作用〜</h1>
    <p>「今日の10問」「自由演習」「暗記カード」の3モードで、全<span id="muscleCount">-</span>筋(筋群は個々の筋肉に分割済み)の起始・停止・作用を色んな角度から復習できます。間違えた筋肉・見た回数が少ない筋肉ほど優先的に出題されます。</p>
  </header>

  <div class="modebar" id="modeBar"></div>

  <div class="dp-wrap" id="dailyProgress"></div>

  <div class="stats">
    <div class="stat"><b id="statTotal">0</b><span>解答数</span></div>
    <div class="stat"><b id="statCorrect">0</b><span>正解数</span></div>
    <div class="stat"><b id="statRate">0%</b><span>正答率</span></div>
  </div>

  <div class="region-bar" id="regionBar"></div>

  <div class="card" id="quizCard">
    <div class="qmeta">
      <span class="qtag" id="qRegion">部位</span>
      <span class="qnum" id="qCount">Q1</span>
    </div>
    <div class="diagram" id="diagramBox"></div>
    <div class="qtitle" id="qTitle">読み込み中...</div>
    <div id="optionsBox"></div>
    <div id="flashBox" style="display:none;"></div>
    <div class="explain" id="explainBox"></div>
    <button class="nextbtn" id="nextBtn">次の問題へ</button>
  </div>

  <div class="actionrow">
    <div class="smallbtn" id="resetBtn">成績をリセット</div>
    <div class="smallbtn" id="reviewBtn">間違えた筋肉を見る</div>
    <div class="smallbtn" id="notifyBtn">🔕 リマインダー設定</div>
  </div>

  <footer>阿部はじめ さんの学習用 &middot; ローカル保存のみ(サーバー送信なし)</footer>
</div>

<script>
// ---------- 筋肉データ ----------
// origin / insertion は短い名詞句で統一(選択肢の自動生成に使うため)
const MUSCLES = [
  // 肩甲帯・肩
  {name:"三角筋", region:"肩", origin:"鎖骨外側1/3・肩峰・肩甲棘", insertion:"上腕骨三角筋粗面",
   action:"肩関節の外転(全体)、屈曲(前部)、伸展(後部)", hint:"肩をぐるっと覆う三角のカバー筋。前・中・後で働きが変わる。"},
  {name:"僧帽筋", region:"肩", origin:"後頭骨・全頸椎・全胸椎の棘突起", insertion:"鎖骨外側1/3・肩峰・肩甲棘",
   action:"肩甲骨の挙上(上部)・内転(中部)・下制と下方回旋(下部)", hint:"背中の僧侶の頭巾(僧帽)のような形。上中下で肩甲骨の動きが変わる。"},
  {name:"広背筋", region:"肩", origin:"下位胸椎・腰椎棘突起(胸腰筋膜)・腸骨稜・下位肋骨", insertion:"上腕骨小結節稜",
   action:"肩関節の伸展・内転・内旋", hint:"背中の逆三角形の主役。懸垂やラットプルダウンで使う筋。"},
  {name:"大胸筋", region:"肩", origin:"鎖骨内側部(鎖骨頭)・胸骨と肋軟骨(胸肋頭)・腹直筋鞘(腹部頭)", insertion:"上腕骨大結節稜",
   action:"肩関節の内転・内旋・水平屈曲(鎖骨頭は屈曲にも関与)", hint:"3つの頭が扇状に集まって上腕骨に停止するイメージ。"},
  {name:"前鋸筋", region:"肩", origin:"第1〜9肋骨外側面", insertion:"肩甲骨内側縁(肋骨面)",
   action:"肩甲骨の外転(前方突出)・上方回旋", hint:"ノコギリ(鋸)状に肋骨から起こる。パンチ動作の要。"},
  {name:"菱形筋", region:"肩", origin:"下位頸椎・上位胸椎棘突起", insertion:"肩甲骨内側縁",
   action:"肩甲骨の内転(背骨側に寄せる)・下方回旋", hint:"ひし形(菱形)の名の通り左右対称に背骨と肩甲骨を結ぶ。"},
  {name:"棘上筋", region:"肩", origin:"肩甲骨棘上窩", insertion:"上腕骨大結節上部",
   action:"肩関節外転の開始(0〜15度)", hint:"ローテーターカフの一つ。腕を上げ始める最初の一押し。"},
  {name:"棘下筋", region:"肩", origin:"肩甲骨棘下窩", insertion:"上腕骨大結節後部",
   action:"肩関節の外旋", hint:"ローテーターカフ。棘の下にあるから棘下筋、外旋担当。"},
  {name:"肩甲下筋", region:"肩", origin:"肩甲骨肩甲下窩(前面)", insertion:"上腕骨小結節",
   action:"肩関節の内旋", hint:"肩甲骨の裏側(肋骨側)から起こる唯一の内旋筋。"},
  {name:"小円筋", region:"肩", origin:"肩甲骨外側縁上部", insertion:"上腕骨大結節下部",
   action:"肩関節の外旋(棘下筋を補助)", hint:"SITS(棘上筋・棘下筋・小円筋・肩甲下筋)の最後の一つ。棘下筋の下で同じ外旋方向。"},
  {name:"大円筋", region:"肩", origin:"肩甲骨下角", insertion:"上腕骨小結節稜",
   action:"肩関節の内転・内旋・伸展", hint:"「広背筋の小さな相棒」。停止部位も広背筋と同じ小結節稜。"},
  {name:"肩甲挙筋", region:"肩", origin:"上位頸椎(C1〜C4)横突起", insertion:"肩甲骨上角",
   action:"肩甲骨の挙上", hint:"名前の通り肩甲骨を挙げる筋。首こりで緊張しやすい筋としても有名。"},
  {name:"小胸筋", region:"肩", origin:"第3〜5肋骨", insertion:"肩甲骨烏口突起",
   action:"肩甲骨の下制・前傾(引き下げ)", hint:"大胸筋の深層にある小さい筋。肋骨から烏口突起へ斜めに走る。"},

  // 頸部
  {name:"胸鎖乳突筋", region:"頸部", origin:"胸骨柄・鎖骨内側端", insertion:"側頭骨乳様突起",
   action:"頭部の回旋(反対側)、両側収縮で頭部の屈曲", hint:"胸骨・鎖骨・乳様突起を結ぶ筋。片側だけ縮むと首をかしげる。"},
  {name:"前斜角筋", region:"頸部", origin:"頸椎(C3〜C6)横突起前結節", insertion:"第1肋骨(斜角筋結節)",
   action:"頸部の側屈・同側回旋、深吸気時の第1肋骨挙上", hint:"3本の斜角筋で最も前方。すぐ後ろを鎖骨下動脈・腕神経叢が通る。"},
  {name:"中斜角筋", region:"頸部", origin:"頸椎(C2〜C7)横突起後結節", insertion:"第1肋骨(鎖骨下動脈溝より後方)",
   action:"頸部の側屈、深吸気時の第1肋骨挙上", hint:"3本の中で最も長い。前斜角筋との隙間(斜角筋隙)を血管・神経が通る。"},
  {name:"後斜角筋", region:"頸部", origin:"頸椎(C4〜C6)横突起後結節", insertion:"第2肋骨",
   action:"頸部の側屈、深吸気時の第2肋骨挙上", hint:"3本の中で唯一、第2肋骨に停止する。"},

  // 上腕
  {name:"上腕二頭筋", region:"上腕", origin:"長頭:肩甲骨関節上結節／短頭:肩甲骨烏口突起", insertion:"橈骨粗面",
   action:"肘関節の屈曲・前腕の回外", hint:"力こぶ。2つの頭は両方とも肩甲骨から始まる。"},
  {name:"上腕三頭筋", region:"上腕", origin:"長頭:肩甲骨関節下結節／外側頭・内側頭:上腕骨後面", insertion:"尺骨肘頭",
   action:"肘関節の伸展", hint:"3頭のうち長頭だけ肩甲骨から、残り2頭は上腕骨から。停止は共通で肘頭。"},
  {name:"上腕筋", region:"上腕", origin:"上腕骨前面下半", insertion:"尺骨粗面",
   action:"肘関節の屈曲(前腕の回旋位に関係なく働く)", hint:"力こぶの下に隠れた縁の下の力持ち、純粋な肘屈筋。"},
  {name:"腕橈骨筋", region:"上腕", origin:"上腕骨外側顆上稜", insertion:"橈骨茎状突起",
   action:"肘関節の屈曲", hint:"前腕の一番外側、ビール瓶を持ち上げる時に浮き出る筋。"},

  // 前腕
  {name:"円回内筋", region:"前腕", origin:"上腕骨内側上顆", insertion:"橈骨中央外側面",
   action:"前腕の回内", hint:"「回内」の名の通り、前腕をひねって手のひらを下に向ける動き。"},
  {name:"回外筋", region:"前腕", origin:"上腕骨外側上顆・尺骨近位", insertion:"橈骨近位外側面",
   action:"前腕の回外", hint:"円回内筋の反対の動き。手のひらを上に向ける「回外」を担当。"},
  {name:"橈側手根屈筋", region:"前腕", origin:"上腕骨内側上顆(共通屈筋起始)", insertion:"第2中手骨底(一部第3中手骨底)",
   action:"手関節の掌屈・橈屈", hint:"手首の親指側で腱が触れやすい。橈骨側に停止するので橈屈も担当。"},
  {name:"尺側手根屈筋", region:"前腕", origin:"上腕頭:上腕骨内側上顆／尺骨頭:尺骨肘頭・後縁", insertion:"豆状骨・第5中手骨底",
   action:"手関節の掌屈・尺屈", hint:"前腕屈筋群の中で唯一、尺骨神経に支配される。小指側(尺側)で触れる。"},
  {name:"長掌筋", region:"前腕", origin:"上腕骨内側上顆", insertion:"手掌腱膜",
   action:"手関節の掌屈、手掌腱膜の緊張", hint:"約1割の人で欠損する筋。親指と小指をつけると手首中央に浮き出る腱。"},
  {name:"総指伸筋", region:"前腕", origin:"上腕骨外側上顆(共通伸筋起始)", insertion:"第2〜5指の指骨(伸筋腱膜を介して)",
   action:"手指(MP関節)の伸展、手関節の背屈", hint:"手の甲に浮き出る4本の腱の元。指を伸ばす代表選手。"},
  {name:"橈側手根伸筋(長・短)", region:"前腕", origin:"長橈側手根伸筋:上腕骨外側顆上稜／短橈側手根伸筋:上腕骨外側上顆", insertion:"長:第2中手骨底／短:第3中手骨底",
   action:"手関節の背屈・橈屈", hint:"腕橈骨筋のすぐ後ろを並走する2本。テニス肘で痛みが出やすい部位の一つ。"},
  {name:"尺側手根伸筋", region:"前腕", origin:"上腕骨外側上顆・尺骨後縁", insertion:"第5中手骨底",
   action:"手関節の背屈・尺屈", hint:"前腕の尺側(小指側)を走る伸筋。尺側手根屈筋と表裏の関係。"},

  // 体幹
  {name:"腹直筋", region:"体幹", origin:"恥骨稜・恥骨結合", insertion:"剣状突起・第5〜7肋軟骨",
   action:"体幹の屈曲(腹部を丸める)", hint:"いわゆる腹筋の縦ライン(シックスパック)。"},
  {name:"外腹斜筋", region:"体幹", origin:"下位8肋骨外面", insertion:"腸骨稜・鼠径靱帯・腹直筋鞘(白線)",
   action:"体幹の回旋(反対側)・側屈", hint:"ポケットに手を入れる方向の斜めの筋。表層にある。"},
  {name:"内腹斜筋", region:"体幹", origin:"腸骨稜・鼠径靱帯・胸腰筋膜", insertion:"下位肋骨・腹直筋鞘",
   action:"体幹の回旋(同側)・側屈", hint:"外腹斜筋の内側(深層)にあり、線維の向きは逆(八の字)。"},
  {name:"脊柱起立筋", region:"体幹", origin:"仙骨・腸骨稜・椎骨棘突起", insertion:"肋骨・椎骨・後頭骨",
   action:"脊柱の伸展(姿勢保持)", hint:"背骨に沿って縦に走る太いロープ状の筋群。姿勢を支える柱。"},
  {name:"横隔膜", region:"体幹", origin:"胸骨・肋骨内面・腰椎(腰椎部)", insertion:"腱中心",
   action:"収縮して下降することで胸腔を広げる(主動的な吸気筋)", hint:"唯一の主呼吸筋。ドーム状で収縮すると平らになり肺に空気が入る。"},
  {name:"外肋間筋", region:"体幹", origin:"上位肋骨下縁", insertion:"下位肋骨上縁",
   action:"肋骨の挙上(吸気の補助)", hint:"線維の向きはポケットに手を入れる方向。表層にあり、吸気を助ける。"},
  {name:"内肋間筋", region:"体幹", origin:"下位肋骨上縁", insertion:"上位肋骨下縁",
   action:"肋骨の引き下げ(呼気の補助)", hint:"外肋間筋の深層で線維の向きが逆(八の字)。強い呼気を助ける。"},
  {name:"腰方形筋", region:"体幹", origin:"腸骨稜", insertion:"第12肋骨・上位腰椎横突起",
   action:"体幹の側屈、骨盤の挙上、強い呼気の補助", hint:"腰の深層にある四角い筋。片側で縮むと骨盤を吊り上げる。"},

  // 股関節・大腿
  {name:"大殿筋", region:"股関節・大腿", origin:"腸骨翼後面・仙骨・尾骨", insertion:"腸脛靱帯・大腿骨殿筋粗面",
   action:"股関節の伸展・外旋", hint:"お尻で一番大きい筋。階段を上る・立ち上がる動作の主役。"},
  {name:"中殿筋", region:"股関節・大腿", origin:"腸骨翼外面", insertion:"大腿骨大転子",
   action:"股関節の外転(片脚立ちで骨盤を安定させる)", hint:"大殿筋の深層・外側。片足立ちで骨盤が傾かないよう支える。"},
  {name:"小殿筋", region:"股関節・大腿", origin:"腸骨翼外面(中殿筋の深層)", insertion:"大腿骨大転子",
   action:"股関節の外転(中殿筋を補助)", hint:"中殿筋のさらに深層にある一番小さい殿筋。働きは中殿筋とほぼ同じ。"},
  {name:"梨状筋", region:"股関節・大腿", origin:"仙骨前面", insertion:"大腿骨大転子上縁",
   action:"股関節の外旋(屈曲位では外転にも関与)", hint:"洋梨のような形。すぐそばを坐骨神経が通り、坐骨神経痛の原因になることもある。"},

function loadState(){

  }catch(e){}
  if(!s){
    // v1(PWA化以前)のデータがあれば引き継ぐ
    try{
      const old = localStorage.getItem("muscle_quiz_state_v1");
      if(old) s = JSON.parse(old);
    }catch(e){}
  }
  if(!s) s = {};
  return Object.assign({
    total:0, correct:0, wrongMuscles:{}, recent:[],
    mastery:{}, daily:null, notifyEnabled:false, lastMode:"daily"
  }, s);
}

// ---------- 習熟度(簡易間隔反復) ----------
function updateMastery(name, isCorrect){
  if(!state.mastery[name]) state.mastery[name] = {box:0, wrong:0, seen:0};
  const ms = state.mastery[name];
  ms.seen++;
  if(isCorrect) ms.box = Math.min(4, ms.box+1);
  else { ms.box = 0; ms.wrong++; }
}
function weightFor(m){
  const ms = state.mastery[m.name] || {box:0, wrong:0, seen:0};
  const boxWeight = (4 - ms.box) + 1;      // box0→5, box4→1
  const wrongWeight = ms.wrong * 1.5;      // 間違いが多いほど出やすい
  const unseenBonus = ms.seen===0 ? 3 : 0; // 未出題を優先
  return Math.max(0.5, boxWeight + wrongWeight + unseenBonus);
}
function pickWeighted(pool, excludeNames){
  excludeNames = excludeNames || [];
  let candidates = pool.filter(m=>!excludeNames.includes(m.name));
  if(candidates.length===0) candidates = pool;
  const weights = candidates.map(weightFor);
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(let i=0;i<candidates.length;i++){
    r -= weights[i];
    if(r<=0) return candidates[i];
  }
  return candidates[candidates.length-1];
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pickMuscle(){
  const pool = currentRegion==="すべて" ? MUSCLES : MUSCLES.filter(m=>m.region===currentRegion);
  const recentNames = state.recent.slice(-4);
  return pickWeighted(pool, recentNames);
}

// ---------- 今日の10問 ----------
function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function ensureDaily(){
  if(!state.daily || state.daily.date !== todayStr()){
    const used = new Set();
    const chosen = [];
    while(chosen.length<10 && used.size<MUSCLES.length){
      const m = pickWeighted(MUSCLES.filter(x=>!used.has(x.name)));
      chosen.push(m.name);
      used.add(m.name);
    }
    state.daily = {date: todayStr(), list: chosen, answered: [], notified: null};
    saveState();
  }
}
function renderDailyProgress(){
  ensureDaily();
  const done = state.daily.answered.length;
  dailyProgress.innerHTML = `
    <div class="dp-bar"><div class="dp-fill" style="width:${done/10*100}%"></div></div>
    <div class="dp-label">今日の10問: ${done}/10 完了</div>`;
}

// ---------- 出題(4択・出題形式をランダム化) ----------
function buildQuestion(target){
  const types = ["combo","origin","insertion","action","name"];
  const type = types[Math.floor(Math.random()*types.length)];
  const pool = MUSCLES.filter(m=>m.name!==target.name);

  function uniqueDistractors(getField, n){
    const correct = getField(target);
    const vals = new Set();
    for(const m of shuffle(pool)){
      const v = getField(m);
      if(v!==correct) vals.add(v);
      if(vals.size>=n) break;
    }
    return Array.from(vals);
  }

  if(type==="origin"){
    const correctText = target.origin;
    const options = shuffle([correctText, ...uniqueDistractors(m=>m.origin, 3)]);
    return {promptHTML:`<span class="muscle">${target.name}</span> の<b>起始</b>はどれ？`, options, correctText};
  }
  if(type==="insertion"){
    const correctText = target.insertion;
    const options = shuffle([correctText, ...uniqueDistractors(m=>m.insertion, 3)]);
    return {promptHTML:`<span class="muscle">${target.name}</span> の<b>停止</b>はどれ？`, options, correctText};
  }
  if(type==="action"){
    const correctText = target.action;
    const options = shuffle([correctText, ...uniqueDistractors(m=>m.action, 3)]);
    return {promptHTML:`<span class="muscle">${target.name}</span> の<b>作用</b>はどれ？`, options, correctText};
  }
  if(type==="name"){
    const correctText = target.name;
    const distractors = shuffle(pool).slice(0,3).map(m=>m.name);
    return {promptHTML:`起始「${target.origin}」・停止「${target.insertion}」を持つ筋肉は？`, options: shuffle([correctText, ...distractors]), correctText};
  }
  // combo(起始・停止セット、デフォルト)
  const correctText = `${target.origin} → ${target.insertion}`;
  const others = shuffle(pool).slice(0,6);
  const wrongSet = new Set();
  let i=0;
  while(wrongSet.size<3 && i<others.length){
    const o = others[i]; const j=(i+1)%others.length; const insM = others[j]||o;
    const text = `${o.origin} → ${insM.insertion}`;
    if(text!==correctText) wrongSet.add(text);
    i++;
  }
  let k=0;
  while(wrongSet.size<3 && k<others.length){
    const o=others[k]; const text = `${o.origin} → ${o.insertion}`;
    if(text!==correctText) wrongSet.add(text);
    k++;
  }
  return {promptHTML:`<span class="muscle">${target.name}</span> の起始・停止の組み合わせとして正しいものは？`, options: shuffle([correctText, ...Array.from(wrongSet)]), correctText};
}

function nextQuestion(){
  explainBox.classList.remove("show");
  nextBtn.classList.remove("show");

  let target;
  if(currentMode==="daily"){
    ensureDaily();
    const remaining = state.daily.list.filter(n=>!state.daily.answered.includes(n));
    if(remaining.length===0){ showDailyComplete(); return; }
    const name = remaining[Math.floor(Math.random()*remaining.length)];
    target = MUSCLES.find(m=>m.name===name);
  } else {
    target = pickMuscle();
  }

  const q = buildQuestion(target);
  currentQ = {target, options:q.options, correctText:q.correctText, answered:false};

  qRegion.textContent = target.region;
  qCount.textContent = currentMode==="daily" ? `今日 ${state.daily.answered.length+1}/10` : `解答数 ${state.total}`;
  diagramBox.innerHTML = bodyDiagramSVG(target.region);
  qTitle.innerHTML = q.promptHTML;

  optionsBox.innerHTML = "";
  q.options.forEach(optText=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = optText;
    btn.onclick = ()=>selectOption(btn, optText);
    optionsBox.appendChild(btn);
  });
}

function showDailyComplete(){
  qRegion.textContent = "今日の分";
  qCount.textContent = "10/10";
  diagramBox.innerHTML = "";
  qTitle.innerHTML = "🎉 今日の10問は完了です！";
  optionsBox.innerHTML = "";
  explainBox.innerHTML = "<div>お疲れさまでした。明日また新しい10問が出題されます。もっと練習したい場合は「自由演習」か「暗記カード」タブへどうぞ。</div>";
  explainBox.classList.add("show");
  nextBtn.classList.remove("show");
}

function selectOption(btn, text){
  if(currentQ.answered) return;
  currentQ.answered = true;
  const isCorrect = text===currentQ.correctText;
  const name = currentQ.target.name;

  state.total++;
  if(isCorrect) state.correct++;
  else state.wrongMuscles[name] = (state.wrongMuscles[name]||0)+1;
  state.recent.push(name);
  if(state.recent.length>10) state.recent.shift();
  updateMastery(name, isCorrect);
  if(currentMode==="daily" && !state.daily.answered.includes(name)){
    state.daily.answered.push(name);
  }
  saveState();
  renderStats();
  if(currentMode==="daily") renderDailyProgress();

  Array.from(optionsBox.children).forEach(el=>{
    el.classList.add("disabled");
    if(el.textContent===currentQ.correctText) el.classList.add("correct");
    else if(el===btn) el.classList.add("wrong");
  });

  explainBox.innerHTML = `
    <div><b>${isCorrect?"正解！":"不正解"}</b> ー ${name}</div>
    <div style="margin-top:6px;">起始・停止: ${currentQ.target.origin} → ${currentQ.target.insertion}</div>
    <div style="margin-top:4px;">作用: ${currentQ.target.action}</div>
    <div class="hint">覚え方のヒント: ${currentQ.target.hint}</div>
  `;
  explainBox.classList.add("show");
  nextBtn.classList.add("show");
}

nextBtn.onclick = nextQuestion;

      </div>
      <div class="actionrow" style="margin-top:12px;">
        <div class="smallbtn" id="flashBad" style="background:#faeae7;border-color:var(--bad);color:#8a2a1c;">まだ苦手</div>
        <div class="smallbtn" id="flashGood" style="background:#e9f4ea;border-color:var(--good);color:#245830;">覚えた</div>
      </div>`;
    document.getElementById("flashGood").onclick = ()=>rateFlash(true);
    document.getElementById("flashBad").onclick = ()=>rateFlash(false);
  }
}
function rateFlash(isGood){
  const name = currentFlash.target.name;
  state.total++;
  if(isGood) state.correct++;
  else state.wrongMuscles[name] = (state.wrongMuscles[name]||0)+1;
  state.recent.push(name);
  if(state.recent.length>10) state.recent.shift();
  updateMastery(name, isGood);
  saveState();
  renderStats();
  nextFlashcard();
}

// ---------- モード切り替えの入口 ----------
function startFlow(){
  if(currentMode==="flash"){
    optionsBox.style.display = "none";
    flashBox.style.display = "block";
    nextFlashcard();
  } else {
    flashBox.style.display = "none";
    optionsBox.style.display = "block";
    explainBox.classList.remove("show");
    nextBtn.classList.remove("show");
    nextQuestion();
  }
}

// ---------- リセット・復習 ----------
document.getElementById("resetBtn").onclick = ()=>{
  if(confirm("成績・間違えた記録・習熟度をすべてリセットしますか？")){
    state = {total:0, correct:0, wrongMuscles:{}, recent:[], mastery:{}, daily:null, notifyEnabled: state.notifyEnabled, lastMode: currentMode};
    saveState();
    renderStats();
    renderDailyProgress();
    startFlow();
  }
};

document.getElementById("reviewBtn").onclick = ()=>{
  const entries = Object.entries(state.wrongMuscles).sort((a,b)=>b[1]-a[1]);
  if(entries.length===0){
    alert("まだ間違えた筋肉はありません。");
    return;
  }
  const msg = entries.map(([name,count])=>{
    const box = state.mastery[name] ? state.mastery[name].box : 0;
    return `${name}: 間違い${count}回(習熟度 ${box}/4)`;
  }).join("\n");
  alert("間違えた回数が多い筋肉:\n\n"+msg);
};

// ---------- リマインダー(アプリ内通知。閉じている間の自動配信ではありません) ----------
function renderNotifyBtn(){
  notifyBtn.textContent = state.notifyEnabled ? "🔔 リマインダーON" : "🔕 リマインダー設定";
}
notifyBtn.onclick = async ()=>{
  if(!("Notification" in window)){
    alert("このブラウザ・端末は通知に対応していません。");
    return;
  }
  if(!state.notifyEnabled){
    const perm = await Notification.requestPermission();
    if(perm==="granted"){
      state.notifyEnabled = true;
      saveState();
      alert("リマインダーをONにしました。アプリを開いたときに今日の10問が未完了なら通知します(アプリを閉じている間に自動で届くものではありません)。");
    } else {
      alert("通知が許可されませんでした。");
    }
  } else {
    state.notifyEnabled = false;
    saveState();
  }
  renderNotifyBtn();
};
function maybeShowDailyReminder(){
  if(!state.notifyEnabled) return;
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  ensureDaily();
  if(state.daily.answered.length>=10) return;
  if(state.daily.notified===todayStr()) return;
  try{
    new Notification("筋肉クイズ", {
      body:`今日の10問、残り${10-state.daily.answered.length}問です`,
      icon:"icons/icon-192.png"
    });
  }catch(e){}
  state.daily.notified = todayStr();
  saveState();
}

// ---------- 初期化 ----------
document.getElementById("muscleCount").textContent = MUSCLES.length;
renderModeBar();
renderRegionBar();
regionBar.style.display = currentMode==="daily" ? "none" : "flex";
renderStats();
ensureDaily();
renderDailyProgress();
renderNotifyBtn();
startFlow();
maybeShowDailyReminder();

// ---------- PWA: Service Worker登録 ----------
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
